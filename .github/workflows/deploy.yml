name: Build and Deploy to printr Subdomain

on:
  push:
    branches:
      - main # This ensures it only deploys when you push to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🛠️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm" # Speeds up future builds

      - name: 📦 Install dependencies
        run: npm install

      - name: 🏗️ Build Project
        run: npm run build

      - name: 🚀 Sync files to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./
          timeout: 600000
          # The './' above works because your FTP account is locked to the subdomain's root directory. Adjust if needed.
